name: Deploy FIBRA to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pela UI do GitHub

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: hosting-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          PUBLIC_FIREBASE_API_KEY:              ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN:          ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_PROJECT_ID:           ${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET:       ${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID:               ${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID:       ${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          PUBLIC_GEMINI_API_KEY:                ${{ secrets.PUBLIC_GEMINI_API_KEY }}
          PUBLIC_WATCH_WEBHOOK_URL:             ${{ secrets.PUBLIC_WATCH_WEBHOOK_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FIBRA_F1D34 }}
          channelId: live
          projectId: fibra-f1d34
